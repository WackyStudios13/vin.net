<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warden's Gambit: The Iron-Clad Chronicle</title>
    <style>
        body { background-color: black; color: #d4af37; font-family: 'serif', 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #fantasy-story { width: 85%; max-width: 950px; font-size: 2.4rem; text-align: center; line-height: 1.6; font-style: italic; opacity: 0; transition: opacity 1500ms ease-in-out; text-shadow: 0 0 25px rgba(212, 175, 55, 0.4); }
        #black-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; opacity: 1; transition: opacity 2500ms ease-in-out; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="black-overlay"></div>
    <div id="fantasy-story"></div>

    <script>
        const API_KEY = "AIzaSyBZu5OpgZPLX6AGqC3wAuDLA1yo9-LHv3k";
        
        // This array grows as the story plays. We check against it to prevent ANY repetition.
        let usedSentences = [];
        let currentStep = 0;
        const totalSteps = 10;

        // Forced narrative shifts to break the AI's logic loops
        const plotDirectives = [
            "Start: A cryptic discovery.",
            "Shift: The atmosphere turns hostile.",
            "Action: A sudden movement in the dark.",
            "Mystery: An object is found that defies physics.",
            "Horror: A physical transformation occurs.",
            "Tension: The protagonist hears a warning.",
            "Conflict: A barrier is broken.",
            "Climax: The final truth is revealed.",
            "Resolution: The price is paid.",
            "End: A haunting final image."
        ];

        // Emergency "Breaker" lines if the AI fails 3 times to be unique
        const breakers = [
            "The ground beneath them turns to cold iron.",
            "A choir of faceless statues begins to hum.",
            "The sky bleeds gold into the churning sea.",
            "Time itself seems to pull at their skin."
        ];

        async function fetchUniqueLine(retryCount = 0) {
            const lastLine = usedSentences[usedSentences.length - 1] || "The beginning.";
            const goal = plotDirectives[currentStep];
            const randomSeed = Math.random();

            const prompt = `You are a grimdark narrator. 
                            CURRENT GOAL: ${goal}. 
                            PREVIOUS LINE: "${lastLine}".
                            STRICT RULES: 
                            - One sentence, max 10 words. 
                            - NO SIMILARITY to previous lines. 
                            - Use high-level vocabulary. 
                            - SEED: ${randomSeed}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let candidate = data.candidates[0].content.parts[0].text.trim();

                // 🛑 THE ANTI-LOOP CHECK
                // Check if the AI returned a sentence we've already used or a generic "error" response
                if (usedSentences.some(s => s.toLowerCase() === candidate.toLowerCase()) || candidate.length < 10) {
                    if (retryCount < 2) return await fetchUniqueLine(retryCount + 1);
                    return breakers[Math.floor(Math.random() * breakers.length)];
                }

                return candidate;
            } catch (e) {
                return breakers[Math.floor(Math.random() * breakers.length)];
            }
        }

        async function playStory() {
            const storyDiv = document.getElementById("fantasy-story");
            
            // Generate the next part of the legend
            let text = await fetchUniqueLine();
            usedSentences.push(text);

            // 1. CLEAR AND UPDATE
            storyDiv.textContent = text;
            
            // 2. FADE IN
            storyDiv.style.opacity = "1";

            // 3. WAIT (Visible time)
            await new Promise(r => setTimeout(r, 4500));

            // 4. FADE OUT
            storyDiv.style.opacity = "0";

            // 5. WAIT (Dark time)
            await new Promise(r => setTimeout(r, 2000));

            // 6. INCREMENT AND LOOP
            if (currentStep < totalSteps - 1) {
                currentStep++;
                playStory();
            } else {
                // Final Screen
                document.getElementById("black-overlay").style.opacity = "1";
                setTimeout(() => {
                    storyDiv.textContent = "THE LEGEND ENDS.";
                    storyDiv.style.opacity = "0.5";
                }, 3000);
            }
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById("black-overlay").style.opacity = "0";
                playStory();
            }, 1000);
        };
    </script>
</body>
</html>
