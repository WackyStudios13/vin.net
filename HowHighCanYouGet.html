<!DOCTYPE html>
<html>
<head>
    <title>Click Stop Game</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #ccff00;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 60px;
            margin-top: 100px;
            text-shadow: 0 0 10px #ccff00;
        }

        #counter {
            font-size: 100px;
            margin: 50px;
            text-shadow: 0 0 20px #ccff00;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        #leaderboard {
            display: none;
            margin-top: 50px;
        }

        input, button {
            background: black;
            color: #ccff00;
            border: 2px solid #ccff00;
            padding: 10px;
            font-size: 20px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h1>Click to Stop!</h1>
<div id="counter">0</div>

<div id="leaderboard">
    <h2>Leaderboard</h2>
    <ol id="scores"></ol>

    <input type="text" id="nameInput" placeholder="Your name">
    <br>
    <button onclick="saveScore()">Save Score</button>
    <button onclick="location.reload()">Restart</button>
</div>

<script>
let mantissa = 1;
let exponent = 0;
let running = true;

let growth = 2;

let interval = setInterval(() => {
    if (!running) return;

    mantissa *= growth;

    while (mantissa >= 10) {
        mantissa /= 10;
        exponent++;
    }

    document.getElementById("counter").innerText = formatHuge();
}, 20);

document.addEventListener("click", () => {
    if (!running) return;

    running = false;
    clearInterval(interval);
    showLeaderboard();
});

function formatHuge() {
    const counter = document.getElementById("counter");

    // Try full number first
    let fullNumber = Math.floor(mantissa * Math.pow(10, exponent)).toLocaleString();

    counter.innerText = fullNumber;

    if (counter.scrollWidth <= counter.clientWidth && exponent < 308) {
        return fullNumber;
    }

    // Fallback to scientific notation if too large/wide
    return mantissa.toFixed(2) + " × 10^" + exponent;
}

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

function showLeaderboard() {
    document.getElementById("leaderboard").style.display = "block";
    updateLeaderboard();
}

function saveScore() {
    let name = document.getElementById("nameInput").value || "Anonymous";

    leaderboard.push({
        name: name,
        mantissa: mantissa,
        exponent: exponent
    });

    leaderboard.sort((a, b) => {
        if (b.exponent !== a.exponent) return b.exponent - a.exponent;
        return b.mantissa - a.mantissa;
    });

    leaderboard = leaderboard.slice(0, 3);

    localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

    updateLeaderboard();
}

function updateLeaderboard() {
    let list = document.getElementById("scores");
    list.innerHTML = "";

    leaderboard.forEach(entry => {
        let li = document.createElement("li");
        li.textContent =
            entry.name + " - " +
            entry.mantissa.toFixed(2) + " × 10^" + entry.exponent;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
