<!DOCTYPE html>
<html>
<head>
<title>Skyforge Infinite Chunks</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial;
}
canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:#222;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// =====================
// CANVAS
// =====================
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

// =====================
// WORLD
// =====================
const chunkSize=600;
const chunks={};
let camera={x:0,y:0};

// =====================
// IMAGES
// =====================
let playerImg=new Image();
playerImg.src="https://i.imgur.com/vvy5GUS.png";

let enemyImg=new Image();
enemyImg.src="https://i.imgur.com/SgN0aoj.png";

// =====================
// PLAYER
// =====================
let player={
    x:0,
    y:0,
    speed:4,
    hp:100,
    maxHp:100,
    angle:0
};

// =====================
// DATA
// =====================
let bullets=[];
let enemies=[];

// =====================
// HELPERS
// =====================
function rand(min,max){
    return Math.random()*(max-min)+min;
}

function chunkKey(cx,cy){
    return cx+","+cy;
}

// =====================
// CHUNK GENERATION
// =====================
function generateChunk(cx,cy){
    let key=chunkKey(cx,cy);
    if(chunks[key]) return;

    let chunk={
        rocks:[],
        trees:[],
        caves:[]
    };

    // rocks
    for(let i=0;i<5;i++){
        chunk.rocks.push({
            x:cx*chunkSize+rand(0,chunkSize),
            y:cy*chunkSize+rand(0,chunkSize)
        });
    }

    // trees
    for(let i=0;i<7;i++){
        chunk.trees.push({
            x:cx*chunkSize+rand(0,chunkSize),
            y:cy*chunkSize+rand(0,chunkSize)
        });
    }

    // caves
    for(let i=0;i<1;i++){
        chunk.caves.push({
            x:cx*chunkSize+rand(0,chunkSize),
            y:cy*chunkSize+rand(0,chunkSize),
            r:50+Math.random()*40
        });
    }

    // enemies
    for(let i=0;i<1;i++){
        enemies.push({
            x:cx*chunkSize+rand(0,chunkSize),
            y:cy*chunkSize+rand(0,chunkSize),
            hp:3
        });
    }

    chunks[key]=chunk;
}

function loadNearbyChunks(){
    let pcx=Math.floor(player.x/chunkSize);
    let pcy=Math.floor(player.y/chunkSize);

    for(let y=-2;y<=2;y++){
        for(let x=-2;x<=2;x++){
            generateChunk(pcx+x,pcy+y);
        }
    }
}

// =====================
// INPUT
// =====================
let keys={};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key===" ") shoot();
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
});

canvas.addEventListener("mousemove",e=>{
    let r=canvas.getBoundingClientRect();
    player.angle=Math.atan2(
        e.clientY-r.top-canvas.height/2,
        e.clientX-r.left-canvas.width/2
    );
});

// =====================
// SHOOT
// =====================
function shoot(){
    bullets.push({
        x:player.x,
        y:player.y,
        angle:player.angle,
        speed:10
    });
}

// =====================
// UPDATE
// =====================
function updatePlayer(){
    if(keys["w"]||keys["arrowup"]) player.y-=player.speed;
    if(keys["s"]||keys["arrowdown"]) player.y+=player.speed;
    if(keys["a"]||keys["arrowleft"]) player.x-=player.speed;
    if(keys["d"]||keys["arrowright"]) player.x+=player.speed;
}

function updateEnemies(){
    enemies.forEach(e=>{
        let dx=player.x-e.x;
        let dy=player.y-e.y;
        let d=Math.hypot(dx,dy)||1;

        if(d<500){
            e.x+=dx/d*1.1;
            e.y+=dy/d*1.1;
        }
    });
}

function collision(){
    bullets.forEach((b,bi)=>{
        enemies.forEach((e,ei)=>{
            let dx=e.x-b.x;
            let dy=e.y-b.y;
            if(dx*dx+dy*dy<1600){
                e.hp--;
                bullets.splice(bi,1);
                if(e.hp<=0) enemies.splice(ei,1);
            }
        });
    });

    enemies.forEach(e=>{
        let dx=e.x-player.x;
        let dy=e.y-player.y;
        if(dx*dx+dy*dy<1600){
            player.hp--;
            if(player.hp<=0){
                player.hp=100;
                player.x=0;
                player.y=0;
            }
        }
    });
}

function updateCamera(){
    camera.x=player.x-canvas.width/2;
    camera.y=player.y-canvas.height/2;
}

// =====================
// DRAW
// =====================
function drawGround(){
    ctx.fillStyle="#2d7a2d";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawChunks(){
    for(let key in chunks){
        let c=chunks[key];

        // rocks
        ctx.fillStyle="#666";
        c.rocks.forEach(r=>{
            ctx.fillRect(r.x-camera.x,r.y-camera.y,20,20);
        });

        // trees
        c.trees.forEach(t=>{
            ctx.fillStyle="#5b3a1f";
            ctx.fillRect(t.x-camera.x+8,t.y-camera.y+20,8,20);

            ctx.beginPath();
            ctx.fillStyle="green";
            ctx.arc(t.x-camera.x+12,t.y-camera.y+15,18,0,Math.PI*2);
            ctx.fill();
        });

        // caves
        c.caves.forEach(cv=>{
            let x=cv.x-camera.x;
            let y=cv.y-camera.y;

            let g=ctx.createRadialGradient(x,y,10,x,y,cv.r);
            g.addColorStop(0,"black");
            g.addColorStop(1,"#333");

            ctx.fillStyle=g;
            ctx.beginPath();
            ctx.arc(x,y,cv.r,0,Math.PI*2);
            ctx.fill();
        });
    }
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x-camera.x,player.y-camera.y);
    ctx.rotate(player.angle);
    ctx.drawImage(playerImg,-25,-25,50,50);
    ctx.restore();
}

function drawEnemies(){
    enemies.forEach(e=>{
        ctx.drawImage(enemyImg,e.x-camera.x-25,e.y-camera.y-25,50,50);
    });
}

function drawBullets(){
    bullets.forEach(b=>{
        b.x+=Math.cos(b.angle)*b.speed;
        b.y+=Math.sin(b.angle)*b.speed;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(b.x-camera.x,b.y-camera.y,5,0,Math.PI*2);
        ctx.fill();
    });
}

function drawUI(){
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("HP: "+player.hp,20,25);

    
}

// =====================
// LOOP
// =====================
function loop(){
    loadNearbyChunks();
    updatePlayer();
    updateEnemies();
    collision();
    updateCamera();

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawGround();
    drawChunks();
    drawEnemies();
    drawBullets();
    drawPlayer();
    drawUI();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
